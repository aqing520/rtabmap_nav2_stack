# robot_bringup/config/ekf_local.yaml
#
# Design intent:
# - ekf_node publishes odom -> base_footprint.
# - ICP odom (from rtabmap icp_odometry) contributes local pose + twist.
# - Livox IMU contributes yaw / yaw-rate stabilization.
# - RTAB-Map remains the only global map -> odom source.

ekf_local_filter:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.10
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.10
    print_diagnostics: true
    debug: false
    publish_tf: true
    publish_acceleration: false
    predict_to_current_time: true
    reset_on_time_jump: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # --- ICP 里程计 (rtabmap icp_odometry 输出) ---
    odom0: /odometry/lio
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 20
    odom0_nodelay: false
    odom0_differential: false
    odom0_relative: false

    # --- Livox MID360 板载 IMU ---
    imu0: /livox/imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_queue_size: 50
    imu0_nodelay: false
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true

    odom0_pose_rejection_threshold: 3.0
    odom0_twist_rejection_threshold: 2.0
    imu0_pose_rejection_threshold: 0.8
    imu0_twist_rejection_threshold: 0.8
