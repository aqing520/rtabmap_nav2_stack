# Suggested location:
#   robot_bringup/config/nav2_common.yaml
#
# Design intent:
# - RTAB-Map publishes /map and map -> odom.
# - FAST-LIO publishes odom -> base_footprint and /Odometry.
# - navigation_launch.py from nav2_bringup is used (NOT amcl/localization_launch.py).
# - global_costmap works in map frame; local_costmap works in odom frame.

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /Odometry
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    costmap_update_timeout: 0.30
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ['progress_checker']
    goal_checker_plugins: ['general_goal_checker']
    controller_plugins: ['FollowPath']
    speed_limit_topic: speed_limit

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.30
      movement_time_allowance: 10.0

    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      xy_goal_tolerance: 0.20
      yaw_goal_tolerance: 0.20

    FollowPath:
      plugin: nav2_mppi_controller::MPPIController
      time_steps: 56
      model_dt: 0.05
      batch_size: 1500
      iteration_count: 1
      prune_distance: 1.7
      regenerate_noises: false
      visualize: false
      motion_model: DiffDrive
      vx_max: 0.50
      vx_min: 0.0
      vy_max: 0.0
      wz_max: 1.50
      vx_std: 0.10
      vy_std: 0.0
      wz_std: 0.20
      temperature: 0.40
      gamma: 0.02
      transform_tolerance: 0.15

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 6.0
      height: 6.0
      resolution: 0.05
      robot_radius: 0.22
      transform_tolerance: 0.25
      plugins: ['voxel_layer', 'inflation_layer']
      voxel_layer:
        plugin: nav2_costmap_2d::VoxelLayer
        enabled: true
        publish_voxel_map: false
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: lidar_cloud
        lidar_cloud:
          topic: /cloud_registered_body
          data_type: PointCloud2
          clearing: true
          marking: true
          min_obstacle_height: 0.05
          max_obstacle_height: 1.80
          raytrace_min_range: 0.0
          raytrace_max_range: 4.0
          obstacle_min_range: 0.0
          obstacle_max_range: 3.5
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 2.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      transform_tolerance: 0.40
      robot_radius: 0.22
      resolution: 0.05
      track_unknown_space: true
      plugins: ['static_layer', 'obstacle_layer', 'inflation_layer']
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
        map_topic: /map
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: lidar_cloud
        lidar_cloud:
          topic: /cloud_registered_body
          data_type: PointCloud2
          clearing: true
          marking: true
          min_obstacle_height: 0.05
          max_obstacle_height: 1.80
          raytrace_min_range: 0.0
          raytrace_max_range: 5.0
          obstacle_min_range: 0.0
          obstacle_max_range: 4.0
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 10.0
    planner_plugins: ['GridBased']
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.50
      use_astar: false
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ['simple_smoother']
    simple_smoother:
      plugin: nav2_smoother::SimpleSmoother
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    cycle_frequency: 10.0
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.30
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.2
    min_rotational_vel: 0.2
    rotational_acc_lim: 3.2
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    behavior_plugins: ['spin', 'backup', 'drive_on_heading', 'assisted_teleop', 'wait']
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading
    assisted_teleop:
      plugin: nav2_behaviors/AssistedTeleop
    wait:
      plugin: nav2_behaviors/Wait

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [0.50, 0.0, 1.50]
    min_velocity: [-0.20, 0.0, -1.50]
    max_accel: [1.50, 0.0, 2.50]
    max_decel: [-1.50, 0.0, -2.50]
    odom_topic: /Odometry
    odom_duration: 0.10
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
